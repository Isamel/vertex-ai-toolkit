{% extends "base.html" %}

{% block title %}Error {{ status_code }}{% endblock %}

{% block content %}
<section class="error-page">
    <div class="error-icon">&#9888;</div>
    <h1>{{ status_code }}</h1>
    <p class="error-title">{{ error_title }}</p>
    <p class="error-detail">{{ error_detail }}</p>
    {% if debug_info %}
    <details class="error-debug">
        <summary>Debug Info</summary>
        <pre>{{ debug_info }}</pre>
    </details>
    {% endif %}
    <a href="/" class="btn-home">Go Home</a>
</section>

<style>
    .error-page {
        text-align: center;
        padding: 4rem 1.5rem;
        max-width: 600px;
        margin: 0 auto;
    }

    .error-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.6;
    }

    .error-page h1 {
        font-family: var(--font-mono);
        font-size: 4rem;
        font-weight: 700;
        color: var(--error);
        margin-bottom: 0.5rem;
    }

    .error-title {
        font-size: 1.25rem;
        color: var(--text-primary);
        margin-bottom: 0.75rem;
    }

    .error-detail {
        color: var(--text-secondary);
        font-size: 0.95rem;
        margin-bottom: 2rem;
        line-height: 1.6;
    }

    .error-debug {
        text-align: left;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
        margin-bottom: 2rem;
    }

    .error-debug summary {
        cursor: pointer;
        color: var(--text-secondary);
        font-size: 0.85rem;
        margin-bottom: 0.5rem;
    }

    .error-debug pre {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--error);
        white-space: pre-wrap;
        word-break: break-word;
        overflow-x: auto;
    }

    .btn-home {
        display: inline-block;
        padding: 0.6rem 1.5rem;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        border-radius: calc(var(--radius) / 2);
        font-size: 0.9rem;
        font-weight: 500;
        transition: background 0.2s;
    }

    .btn-home:hover {
        background: var(--accent-hover);
    }
</style>
{% endblock %}
