<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAIG Live Mode — Terminal Demo</title>
  <style>
    /* ── Reset & Kanagawa Theme ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1a1b26;
      --bg-term:     #13141c;
      --bg-titlebar: #24283b;
      --border:      #363646;
      --text:        #c0caf5;
      --text-dim:    #565f89;
      --text-bright: #e0e4ff;
      --green:       #9ece6a;
      --yellow:      #e0af68;
      --red:         #f7768e;
      --blue:        #7aa2f7;
      --cyan:        #7dcfff;
      --purple:      #bb9af7;
      --orange:      #ff9e3b;
      --teal:        #73daca;
      --prompt:      #9ece6a;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Watermark ──────────────────────────────────────── */
    .watermark {
      position: fixed;
      bottom: 12px; right: 18px;
      font-size: 0.65rem;
      color: var(--text-dim);
      opacity: 0.5;
      letter-spacing: 0.08em;
      z-index: 1000;
      pointer-events: none;
    }

    /* ── Terminal Window ────────────────────────────────── */
    .terminal-window {
      width: min(96vw, 920px);
      max-height: 80vh;
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.5),
        0 0 80px rgba(122,162,247,0.06);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    /* Title bar */
    .title-bar {
      background: var(--bg-titlebar);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }
    .title-text {
      flex: 1;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    .title-spacer { width: 52px; }

    /* Terminal body */
    .term-body {
      background: var(--bg-term);
      padding: 16px 20px;
      flex: 1;
      overflow-y: auto;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'SF Mono', 'Consolas', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.55;
      min-height: 420px;
      max-height: calc(80vh - 90px);
    }
    .term-body::-webkit-scrollbar { width: 6px; }
    .term-body::-webkit-scrollbar-track { background: transparent; }
    .term-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Text glow */
    .term-body span, .term-body .line {
      text-shadow: 0 0 4px rgba(192,202,245,0.08);
    }

    /* Cursor */
    .cursor {
      display: inline-block;
      width: 8px; height: 16px;
      background: var(--text);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Line colors */
    .line { white-space: pre; display: block; }
    .c-prompt  { color: var(--prompt); }
    .c-cmd     { color: var(--text-bright); }
    .c-dim     { color: var(--text-dim); }
    .c-blue    { color: var(--blue); }
    .c-cyan    { color: var(--cyan); }
    .c-green   { color: var(--green); }
    .c-yellow  { color: var(--yellow); }
    .c-red     { color: var(--red); }
    .c-purple  { color: var(--purple); }
    .c-orange  { color: var(--orange); }
    .c-teal    { color: var(--teal); }
    .c-text    { color: var(--text); }
    .c-bright  { color: var(--text-bright); }

    /* ── Controls ───────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ctrl-btn {
      background: var(--bg-titlebar);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .ctrl-btn:hover { background: #2f3349; border-color: var(--blue); }
    .ctrl-btn.active { border-color: var(--blue); color: var(--blue); }

    .speed-btns { display: flex; gap: 4px; }

    /* Progress bar */
    .progress-bar-wrap {
      width: min(96vw, 920px);
      height: 3px;
      background: rgba(54,54,70,0.5);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 640px) {
      .terminal-window { width: 100vw; max-height: 85vh; border-radius: 0; }
      .term-body { font-size: 10.5px; padding: 10px 12px; min-height: 320px; }
      .progress-bar-wrap { width: 100vw; }
      .controls { padding: 0 8px; }
    }
  </style>
</head>
<body>

  <div class="watermark">VAIG Demo — Simulated Output</div>

  <div class="terminal-window">
    <div class="title-bar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <div class="title-text">vaig — zsh — prod-us-east1</div>
      <div class="title-spacer"></div>
    </div>
    <div class="term-body" id="terminal"></div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="btn-play" title="Play / Pause">▶ Play</button>
    <button class="ctrl-btn" id="btn-restart" title="Restart">⟳ Restart</button>
    <div class="speed-btns">
      <button class="ctrl-btn active" data-speed="1">1×</button>
      <button class="ctrl-btn" data-speed="2">2×</button>
      <button class="ctrl-btn" data-speed="4">4×</button>
    </div>
  </div>

<script>
/* ─── Animation Engine ──────────────────────────────────── */
const $ = s => document.querySelector(s);
const term = $('#terminal');
const progressFill = $('#progress-fill');
const btnPlay = $('#btn-play');
const btnRestart = $('#btn-restart');
const speedBtns = document.querySelectorAll('[data-speed]');

let speed = 1;
let playing = false;
let aborted = false;
let currentResolve = null;

/* Speed controls */
speedBtns.forEach(b => b.addEventListener('click', () => {
  speed = +b.dataset.speed;
  speedBtns.forEach(x => x.classList.remove('active'));
  b.classList.add('active');
}));

function delay(ms) {
  return new Promise(r => {
    currentResolve = r;
    setTimeout(() => { currentResolve = null; r(); }, ms / speed);
  });
}

class AbortError extends Error {
  constructor() { super('ABORT'); this.name = 'AbortError'; }
}
function checkAbort() { if (aborted) throw new AbortError(); }

/* Scroll to bottom */
function scrollDown() {
  term.scrollTop = term.scrollHeight;
}

/* Add a colored line */
function addLine(html) {
  const el = document.createElement('span');
  el.className = 'line';
  el.innerHTML = html;
  term.appendChild(el);
  scrollDown();
}

/* Type characters one by one */
async function typeCmd(text, promptStr) {
  checkAbort();
  const lineEl = document.createElement('span');
  lineEl.className = 'line';
  const promptSpan = `<span class="c-prompt">${promptStr || '$ '}</span>`;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  lineEl.innerHTML = promptSpan;
  lineEl.appendChild(cursor);
  term.appendChild(lineEl);
  scrollDown();

  for (let i = 0; i < text.length; i++) {
    checkAbort();
    const charSpan = document.createElement('span');
    charSpan.className = 'c-cmd';
    charSpan.textContent = text[i];
    lineEl.insertBefore(charSpan, cursor);
    scrollDown();
    await delay(30);
  }

  /* Remove cursor after typing finishes */
  cursor.remove();
  await delay(300);
}

/* Print output lines with delay */
async function printLines(lines, delayMs) {
  for (const line of lines) {
    checkAbort();
    addLine(line);
    await delay(delayMs || 60);
  }
}

/* Print a block all at once */
function printBlock(lines) {
  for (const line of lines) addLine(line);
  scrollDown();
}

/* Blank line */
function blank() { addLine(''); }

/* ─── Scene Definitions ─────────────────────────────────── */

/* helper: colored text */
function c(cls, text) { return `<span class="${cls}">${esc(text)}</span>`; }
function cr(cls, raw) { return `<span class="${cls}">${raw}</span>`; }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function scene1_config() {
  await typeCmd('cat config/default.yaml');
  await delay(200);
  await printLines([
    c('c-dim', '# config/default.yaml'),
    cr('c-purple', 'gcp') + c('c-text', ':'),
    c('c-blue', '  project_id') + c('c-text', ': ') + c('c-green', 'acme-prod-2024'),
    c('c-blue', '  location') + c('c-text', ': ') + c('c-green', 'us-central1'),
    '',
    cr('c-purple', 'gke') + c('c-text', ':'),
    c('c-blue', '  cluster_name') + c('c-text', ': ') + c('c-green', 'prod-us-east1'),
    c('c-blue', '  default_namespace') + c('c-text', ': ') + c('c-green', 'production'),
    c('c-blue', '  argo_request_timeout') + c('c-text', ': ') + c('c-orange', '10'),
    c('c-blue', '  argo_rollouts_enabled') + c('c-text', ': ') + c('c-orange', 'true'),
    '',
    cr('c-purple', 'models') + c('c-text', ':'),
    c('c-blue', '  default') + c('c-text', ': ') + c('c-green', 'gemini-2.5-flash'),
    '',
    cr('c-purple', 'retry') + c('c-text', ':'),
    c('c-blue', '  max_retries') + c('c-text', ': ') + c('c-orange', '5'),
    c('c-blue', '  initial_delay') + c('c-text', ': ') + c('c-orange', '1.0'),
    c('c-blue', '  backoff_multiplier') + c('c-text', ': ') + c('c-orange', '2.0'),
  ], 50);
  await delay(800);
  blank();
}

    { name: 'get_node_conditions',     params: 'node=gke-prod-pool-1-abc123',                    time: '0.4s' },

  for (const tc of toolCalls) {
    checkAbort();
    addLine(c('c-green', '🔧 ') + c('c-cyan', tc.name) + c('c-dim', '(') + c('c-text', tc.params) + c('c-dim', ') ') + c('c-green', '✓') + c('c-dim', ' (' + tc.time + ')'));
    await delay(120);
  }

  await delay(600);
  blank();
}

/* ─── Orchestrator ──────────────────────────────────────── */
const scenes = [
  { fn: scene1_config, start: 0,  end: 16 },
  { fn: scene2_launch,  start: 16, end: 41 },
  { fn: scene3_report,  start: 41, end: 88 },
  { fn: scene4_export,  start: 88, end: 100 },
];

let animRunning = false;

function updateProgress(pct) {
  progressFill.style.width = pct + '%';
}

async function runDemo() {
  if (animRunning) return;
  animRunning = true;
  aborted = false;
  term.innerHTML = '';
  updateProgress(0);
  btnPlay.textContent = '⏸ Pause';

  try {
    for (let i = 0; i < scenes.length; i++) {
      checkAbort();

      /* Smoothly update progress during scene */
      const s = scenes[i];
      const progressInterval = setInterval(() => {
        const current = parseFloat(progressFill.style.width) || s.start;
        if (current < s.end - 2) {
          updateProgress(current + 0.5);
        }
      }, 200 / speed);

      try {
        await s.fn();
      } finally {
        clearInterval(progressInterval);
      }
      updateProgress(s.end);
    }

    updateProgress(100);
    btnPlay.textContent = '✓ Done';
  } catch (e) {
    if (e instanceof AbortError) {
      /* stopped by user */
    } else {
      throw e;
    }
  }
  animRunning = false;
}

/* ─── Controls ──────────────────────────────────────────── */
let paused = false;

btnPlay.addEventListener('click', () => {
  if (animRunning && !paused) {
    /* Pause: we abort the current run */
    paused = true;
    aborted = true;
    if (currentResolve) currentResolve();
    btnPlay.textContent = '▶ Resume';
    animRunning = false;
    return;
  }

  if (paused) {
    /* Resume is effectively a restart from current state — we just restart for simplicity */
    paused = false;
  }

  runDemo();
});

btnRestart.addEventListener('click', () => {
  aborted = true;
  paused = false;
  if (currentResolve) currentResolve();
  animRunning = false;
  setTimeout(() => runDemo(), 100);
});

/* Auto-play on load */
setTimeout(() => runDemo(), 800);
