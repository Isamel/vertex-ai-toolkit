# Example workflow: VAIG GKE Health Check on Pull Requests
#
# This workflow demonstrates how to use the vaig-health-check action
# to scan a GKE cluster for health issues and gate PRs on severity.
#
# Prerequisites:
#   1. Workload Identity Federation (WIF) configured between GitHub and GCP
#      OR a GCP service account key stored as a GitHub secret
#   2. The service account needs roles:
#      - roles/container.viewer (GKE cluster access)
#      - roles/logging.viewer (Cloud Logging)
#      - roles/monitoring.viewer (Cloud Monitoring)
#      - roles/aiplatform.user (Vertex AI Gemini)

name: GKE Health Check (Example)

# This is an EXAMPLE workflow — it only runs manually via workflow_dispatch.
# To use it on PRs, copy this file and add a pull_request trigger:
#   on:
#     pull_request:
#       branches: [main]
on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Kubernetes namespace to scan"
        default: "default"
        required: false

# Required for WIF authentication and PR commenting
permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Authenticate to GCP ──────────────────────────
      #
      # Option A: Workload Identity Federation (recommended)
      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ vars.WIF_POOL }}/providers/${{ vars.WIF_PROVIDER }}"
          service_account: "${{ vars.GCP_SA_EMAIL }}"

      # Option B: Service Account Key (uncomment to use instead of WIF)
      # - name: Authenticate to Google Cloud (SA Key)
      #   id: auth
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── Step 2: Checkout code (needed for local action) ──────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Step 3: Run health check ─────────────────────────────
      - name: VAIG Health Check
        id: health
        uses: ./.github/actions/health-check
        with:
          cluster: ${{ vars.GKE_CLUSTER }}
          project-id: ${{ vars.GCP_PROJECT_ID }}
          location: ${{ vars.GKE_LOCATION }}
          namespace: ${{ github.event.inputs.namespace || 'default' }}
          fail-on: "CRITICAL"
          model: "gemini-2.5-flash"
          comment: "true"
          timeout: "300"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 4: Use outputs in subsequent steps ──────────────
      - name: Check results
        if: always()
        run: |
          echo "Status: ${{ steps.health.outputs.status }}"
          echo "Findings: ${{ steps.health.outputs.findings-count }}"
          echo "Max Severity: ${{ steps.health.outputs.max-severity }}"
