name: VS Code Extension

on:
  push:
    paths:
      - "vscode-extension/**"
  pull_request:
    paths:
      - "vscode-extension/**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint (tsc --noEmit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Unit Tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
      - run: npx vitest run

  build:
    name: Build (esbuild)
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
      - run: npm run compile
