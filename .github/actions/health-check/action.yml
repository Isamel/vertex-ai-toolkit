name: "VAIG Health Check"
description: "Run GKE service health discovery via Vertex AI and gate PRs on severity threshold"

branding:
  icon: shield
  color: blue

inputs:
  cluster:
    description: "GKE cluster name"
    required: true
  project-id:
    description: "GCP project ID"
    required: true
  location:
    description: "GKE cluster location (e.g. us-central1)"
    required: true
  namespace:
    description: "Kubernetes namespace to scan"
    required: false
    default: "default"
  fail-on:
    description: "Minimum severity to fail the check: CRITICAL, HIGH, MEDIUM, LOW, INFO"
    required: false
    default: "CRITICAL"
  model:
    description: "Gemini model to use for analysis"
    required: false
    default: "gemini-2.5-flash"
  comment:
    description: "Post health report as PR comment (true/false)"
    required: false
    default: "true"
  timeout:
    description: "Pipeline timeout in seconds"
    required: false
    default: "300"

outputs:
  status:
    description: "Overall health status: pass, fail, or error"
    value: ${{ steps.run.outputs.status }}
  findings-count:
    description: "Total number of findings"
    value: ${{ steps.run.outputs.findings-count }}
  max-severity:
    description: "Highest severity found: CRITICAL, HIGH, MEDIUM, LOW, INFO, or NONE"
    value: ${{ steps.run.outputs.max-severity }}
  report:
    description: "Full health report in markdown"
    value: ${{ steps.run.outputs.report }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install VAIG
      shell: bash
      run: pip install --no-cache-dir "${{ github.workspace }}[live]"

    - name: Run health check
      id: run
      shell: bash
      run: python "${{ github.action_path }}/entrypoint.py"
