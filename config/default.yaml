# Vertex AI Toolkit — Default Configuration
gcp:
  project_id: ""  # Override via VAIG_GCP__PROJECT_ID or --project
  location: "us-central1"  # Override via VAIG_GCP__LOCATION; use "global" for Gemini 3.1 models
  fallback_location: "us-central1"  # Fallback if primary location fails (SSL/connection errors)
  available_projects: []  # Catalog of GCP projects you have access to — example:
  # - project_id: "my-vertex-project"
  #   description: "Vertex AI / Gemini billing"
  #   role: "vertex-ai"
  # - project_id: "my-gke-project"
  #   description: "GKE clusters and monitoring"
  #   role: "gke"

auth:
  mode: "adc"  # "adc" | "impersonate"
  impersonate_sa: ""

models:
  default: "gemini-2.5-pro"
  fallback: "gemini-2.5-flash"
  available:
    # ── Gemini 3.1 series (latest) ──────────────────────────────────
    - id: "gemini-3.1-pro-preview"
      description: "Most advanced reasoning model — 1M context, complex problem-solving, agentic workflows"
      max_output_tokens: 65536
      context_window: 1048576
    - id: "gemini-3.1-pro-preview-customtools"
      description: "Pro optimized for custom tools & bash — best for agentic coding with tool use"
      max_output_tokens: 65536
      context_window: 1048576
    - id: "gemini-3-flash-preview"
      description: "Pro-level intelligence at Flash speed and pricing — 1M context, thinking levels"
      max_output_tokens: 65536
      context_window: 1048576
    - id: "gemini-3.1-flash-lite-preview"
      description: "Most cost-efficient Gemini — matches 2.5 Flash quality, low latency, high volume"
      max_output_tokens: 65535
      context_window: 1048576

    # ── Gemini 2.5 series ───────────────────────────────────────────
    - id: "gemini-2.5-pro"
      description: "Previous gen pro — deep reasoning and coding, 1M context"
      max_output_tokens: 65536
      context_window: 1048576
    - id: "gemini-2.5-flash"
      description: "Previous gen flash — best price-performance for reasoning tasks"
      max_output_tokens: 65536
      context_window: 1048576

    # ── Gemini 2.0 series (deprecated) ──────────────────────────────
    - id: "gemini-2.0-flash"
      description: "[Deprecated] Second gen fast model"
      max_output_tokens: 8192
      context_window: 1048576
    - id: "gemini-2.0-flash-001"
      description: "[Deprecated] Stable second gen fast model (point release)"
      max_output_tokens: 8192
      context_window: 1048576

generation:
  temperature: 0.7
  max_output_tokens: 16384
  top_p: 0.95
  top_k: 40

session:
  db_path: "~/.vaig/sessions.db"
  auto_save: true
  max_history_messages: 100

skills:
  enabled:
    - rca
    - anomaly
    - migration
    - log-analysis
    - error-triage
    - config-audit
    - slo-review
    - postmortem
    - code-review
    - iac-review
    - cost-analysis
    - capacity-planning
    - test-generation
    - compliance-check
    - api-design
    - runbook-generator
    - dependency-audit
    - db-review
    - pipeline-review
    - perf-analysis
    - threat-model
    - change-risk
    - alert-tuning
    - resilience-review
    - incident-comms
    - toil-analysis
    - network-review
    - adr-generator
    - service-health
  custom_dir: null

agents:
  max_concurrent: 3
  orchestrator_model: "gemini-2.5-pro"
  specialist_model: "gemini-2.5-flash"

context:
  max_file_size_mb: 50
  supported_extensions:
    code: [".py", ".js", ".ts", ".java", ".go", ".rs", ".sql", ".sh", ".yaml", ".yml", ".json", ".xml", ".html", ".css", ".toml", ".ini", ".cfg", ".tf", ".hcl"]
    docs: [".md", ".txt", ".rst", ".csv", ".log"]
    media: [".png", ".jpg", ".jpeg", ".gif", ".webp", ".mp3", ".wav", ".mp4"]
    etl: [".ktr", ".kjb", ".kdb"]  # Pentaho files
  ignore_patterns:
    - "__pycache__"
    - ".git"
    - "node_modules"
    - ".venv"
    - "*.pyc"
    - ".DS_Store"
    - "*.egg-info"

retry:
  max_retries: 3
  initial_delay: 1.0
  max_delay: 60.0
  backoff_multiplier: 2.0

logging:
  level: "WARNING"  # Override via VAIG_LOGGING__LEVEL or --verbose/-V
  show_path: false   # Show module path in log output (useful for debugging)

coding:
  workspace_root: "."
  max_tool_iterations: 25
  confirm_actions: true
  allowed_commands: []
  blocked_paths: []

chunking:
  chunk_overlap_ratio: 0.1   # 10% overlap between consecutive chunks
  token_safety_margin: 0.1   # 10% safety margin on context window

gke:
  cluster_name: ""                # GKE cluster name — Override via VAIG_GKE__CLUSTER_NAME
  project_id: ""                  # GCP project hosting the cluster — falls back to gcp.project_id
  default_namespace: "default"    # Kubernetes namespace for queries
  kubeconfig_path: ""             # Path to kubeconfig file — uses default if empty
  context: ""                     # Kubernetes context to use — uses current-context if empty
  log_limit: 100                  # Max number of log lines to retrieve per pod
  metrics_interval_minutes: 60    # Time window (minutes) for Cloud Monitoring queries
  proxy_url: ""                   # Proxy URL for private clusters (kubernetes client ignores kubeconfig proxy-url)
  impersonate_sa: ""               # SA email for GKE/GCP observability APIs — overrides auth.impersonate_sa for GKE tools only

mcp:
  enabled: false                    # Set to true to enable MCP integration
  auto_register: false              # Auto-register MCP server tools into agent pipelines
  servers: []                       # List of MCP servers — example:
  # - name: "filesystem"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
  #   description: "Filesystem access via MCP"
  # - name: "github"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-github"]
  #   env:
  #     GITHUB_PERSONAL_ACCESS_TOKEN: "ghp_..."
  #   description: "GitHub API via MCP"

plugins:
  enabled: false                    # Set to true to enable Python plugin loading
  directories: []                   # Paths to directories containing plugin modules
  # - "./plugins"
  # - "~/.vaig/plugins"

safety:
  enabled: true                     # Set to false to skip sending safety settings entirely
  settings: []                      # List of safety settings — example:
  # Available categories:
  #   HARM_CATEGORY_HARASSMENT, HARM_CATEGORY_HATE_SPEECH,
  #   HARM_CATEGORY_SEXUALLY_EXPLICIT, HARM_CATEGORY_DANGEROUS_CONTENT,
  #   HARM_CATEGORY_CIVIC_INTEGRITY
  # Available thresholds:
  #   BLOCK_LOW_AND_ABOVE, BLOCK_MEDIUM_AND_ABOVE, BLOCK_ONLY_HIGH, BLOCK_NONE, OFF
  # Notes:
  #   - BLOCK_NONE/OFF may be rejected by some Vertex AI projects
  #   - HARM_CATEGORY_CIVIC_INTEGRITY is not supported in all regions
  # - category: "HARM_CATEGORY_HARASSMENT"
  #   threshold: "BLOCK_MEDIUM_AND_ABOVE"
  # - category: "HARM_CATEGORY_HATE_SPEECH"
  #   threshold: "BLOCK_MEDIUM_AND_ABOVE"
  # - category: "HARM_CATEGORY_SEXUALLY_EXPLICIT"
  #   threshold: "BLOCK_MEDIUM_AND_ABOVE"
  # - category: "HARM_CATEGORY_DANGEROUS_CONTENT"
  #   threshold: "BLOCK_MEDIUM_AND_ABOVE"
