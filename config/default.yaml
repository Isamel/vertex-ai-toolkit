# Vertex AI Toolkit — Default Configuration
gcp:
  project_id: ""  # Override via VAIG_GCP__PROJECT_ID or --project
  location: "us-central1"  # Override via VAIG_GCP__LOCATION; use "global" for Gemini 3.1 models
  fallback_location: "us-central1"  # Fallback if primary location fails (SSL/connection errors)
  available_projects: []  # Catalog of GCP projects you have access to — example:
  # - project_id: "my-vertex-project"
  #   description: "Vertex AI / Gemini billing"
  #   role: "vertex-ai"
  # - project_id: "my-gke-project"
  #   description: "GKE clusters and monitoring"
  #   role: "gke"

auth:
  mode: "adc"  # "adc" | "impersonate"
  impersonate_sa: ""

models:
  default: "gemini-2.5-pro"
  fallback: "gemini-2.5-flash"
  available:
    # ── Gemini 3.1 series (latest) ──────────────────────────────────
    - id: "gemini-3.1-pro-preview"
      description: "Most advanced reasoning model — 1M context, complex problem-solving, agentic workflows"
      max_output_tokens: 65536
      context_window: 1048576
    - id: "gemini-3.1-pro-preview-customtools"
      description: "Pro optimized for custom tools & bash — best for agentic coding with tool use"
      max_output_tokens: 65536
      context_window: 1048576
    - id: "gemini-3-flash-preview"
      description: "Pro-level intelligence at Flash speed and pricing — 1M context, thinking levels"
      max_output_tokens: 65536
      context_window: 1048576
    - id: "gemini-3.1-flash-lite-preview"
      description: "Most cost-efficient Gemini — matches 2.5 Flash quality, low latency, high volume"
      max_output_tokens: 65535
      context_window: 1048576

    # ── Gemini 2.5 series ───────────────────────────────────────────
    - id: "gemini-2.5-pro"
      description: "Previous gen pro — deep reasoning and coding, 1M context"
      max_output_tokens: 65536
      context_window: 1048576
    - id: "gemini-2.5-flash"
      description: "Previous gen flash — best price-performance for reasoning tasks"
      max_output_tokens: 65536
      context_window: 1048576

    # ── Gemini 2.0 series (deprecated) ──────────────────────────────
    - id: "gemini-2.0-flash"
      description: "[Deprecated] Second gen fast model"
      max_output_tokens: 8192
      context_window: 1048576
    - id: "gemini-2.0-flash-001"
      description: "[Deprecated] Stable second gen fast model (point release)"
      max_output_tokens: 8192
      context_window: 1048576

generation:
  temperature: 0.7
  max_output_tokens: 16384
  top_p: 0.95
  top_k: 40

session:
  db_path: "~/.vaig/sessions.db"
  auto_save: true
  max_history_messages: 100

skills:
  enabled:
    - rca
    - anomaly
    - migration
    - log-analysis
    - error-triage
    - config-audit
    - slo-review
    - postmortem
    - code-review
    - iac-review
    - cost-analysis
    - capacity-planning
    - test-generation
    - compliance-check
    - api-design
    - runbook-generator
    - dependency-audit
    - db-review
    - pipeline-review
    - perf-analysis
    - threat-model
    - change-risk
    - alert-tuning
    - resilience-review
    - incident-comms
    - toil-analysis
    - network-review
    - adr-generator
    - service-health
  custom_dir: null

agents:
  max_concurrent: 3
  orchestrator_model: "gemini-2.5-pro"
  specialist_model: "gemini-2.5-flash"
  max_iterations_retry: 15
  min_inter_call_delay: 0.0

context:
  max_file_size_mb: 50
  supported_extensions:
    code: [".py", ".js", ".ts", ".java", ".go", ".rs", ".sql", ".sh", ".yaml", ".yml", ".json", ".xml", ".html", ".css", ".toml", ".ini", ".cfg", ".tf", ".hcl"]
    docs: [".md", ".txt", ".rst", ".csv", ".log"]
    media: [".png", ".jpg", ".jpeg", ".gif", ".webp", ".mp3", ".wav", ".mp4"]
    etl: [".ktr", ".kjb", ".kdb"]  # Pentaho files
  ignore_patterns:
    - "__pycache__"
    - ".git"
    - "node_modules"
    - ".venv"
    - "*.pyc"
    - ".DS_Store"
    - "*.egg-info"

retry:
  max_retries: 3
  initial_delay: 1.0
  max_delay: 60.0
  backoff_multiplier: 2.0
  rate_limit_initial_delay: 8.0

logging:
  level: "WARNING"  # Override via VAIG_LOGGING__LEVEL or --verbose/-V
  show_path: false   # Show module path in log output (useful for debugging)
  file_enabled: false         # Write logs to a rotating file for post-mortem debugging (opt-in)
  file_path: "~/.vaig/logs/vaig.log"  # Log file location (supports ~ expansion)
  file_level: "DEBUG"         # Always capture everything to file
  file_max_bytes: 5242880     # 5 MB per file before rotation
  file_backup_count: 3        # Keep 3 backup files (vaig.log.1, .2, .3)
  tool_results: false         # Persist full tool call results as JSONL for post-session analysis (opt-in)
  tool_results_dir: "~/.vaig" # Base directory for tool results (stored under tool_results/ subdir)

coding:
  workspace_root: "."
  max_tool_iterations: 25
  confirm_actions: true
  allowed_commands: []
  blocked_paths: []
  denied_commands:
    # Destructive disk / filesystem operations
    - '\brm\s+(-\w*\s+)*-\w*r\w*\s+/\s*$'  # rm -rf /
    - '\brm\s+(-\w*\s+)*-\w*r\w*\s+/\w'     # rm -rf /anything
    - '\bmkfs\b'
    - '\bdd\b\s+'
    - '\bformat\b'
    - '\bfdisk\b'
    # Fork bomb patterns
    - ':\(\)\s*\{'
    # Insecure permission patterns
    - '\bchmod\s+(-\w+\s+)*777\b'
    # Piped remote execution
    - '\bcurl\b.*\|\s*(sh|bash|zsh)\b'
    - '\bwget\b.*\|\s*(sh|bash|zsh)\b'
    # Generic pipe-to-shell
    - '\|\s*sh\b'
    - '\|\s*bash\b'
    # System control
    - '\bshutdown\b'
    - '\breboot\b'
    - '\bhalt\b'
    - '\bpoweroff\b'
    - '\binit\s+[0-6]'
    # Privilege escalation
    - '^\s*sudo\b'
    # Direct device writes
    - '>\s*/dev/sd'

chunking:
  chunk_overlap_ratio: 0.1   # 10% overlap between consecutive chunks
  token_safety_margin: 0.1   # 10% safety margin on context window

gke:
  cluster_name: ""                # GKE cluster name — Override via VAIG_GKE__CLUSTER_NAME
  project_id: ""                  # GCP project hosting the cluster — falls back to gcp.project_id
  default_namespace: "default"    # Kubernetes namespace for queries
  kubeconfig_path: ""             # Path to kubeconfig file — uses default if empty
  context: ""                     # Kubernetes context to use — uses current-context if empty
  log_limit: 100                  # Max number of log lines to retrieve per pod
  metrics_interval_minutes: 60    # Time window (minutes) for Cloud Monitoring queries
  proxy_url: ""                   # Proxy URL for private clusters (kubernetes client ignores kubeconfig proxy-url)
  impersonate_sa: ""               # SA email for GKE/GCP observability APIs — overrides auth.impersonate_sa for GKE tools only

# Helm integration — discover Helm-managed releases via K8s secrets
helm:
  enabled: true                   # Set to false to disable Helm tools

# ArgoCD integration — introspect ArgoCD Application CRDs
# Auto-detection is enabled by default:
#   - Phase 1: CRD probe (checks for applications.argoproj.io CRD)
#   - Phase 2: Annotation fallback (scans Deployment annotations for ArgoCD markers)
#     Triggers on: argocd.argoproj.io/tracking-id, argocd.argoproj.io/managed-by
# null/omit = auto-detect (CRD probe + annotation scan)
# true = force-enable (requires appropriate RBAC to query ArgoCD CRDs)
# false = disable entirely
argocd:
  # enabled: null                   # null/omit = auto-detect; true = force-enable; false = disable
  server: ""                      # ArgoCD server URL (for REST API mode — not yet implemented)
  token: ""                       # ArgoCD auth token (for REST API mode — not yet implemented)
  context: ""                     # Kubeconfig context for ArgoCD cluster (if different from GKE cluster)
  namespace: "argocd"             # Namespace where ArgoCD Applications live
  verify_ssl: true                # Verify SSL certificates for ArgoCD server

# Argo Rollouts integration — introspect Argo Rollouts CRDs
# Auto-detection is enabled by default:
#   - Phase 1: CRD probe (checks for rollouts.argoproj.io CRD)
#   - Phase 2: Annotation fallback (scans Deployment annotations for Rollout markers)
#     Triggers on: rollout.argoproj.io/revision, rollout.argoproj.io/desired-replicas
# null/omit = auto-detect; true = force-enable; false = disable entirely
#
# TIP: If your Argo Rollouts control-plane runs on a SEPARATE cluster from the
# one vaig connects to, the CRD probe will always fail (the apiextensions endpoint
# is unreachable).  Set `argo_rollouts.enabled: true` under the `gke:` section
# to skip the CRD check and enable Argo Rollouts tools unconditionally.
# This avoids ~5s timeouts per kubectl_get_rollout call caused by the
# unreachable apiextensions endpoint.  Example:
#
#   gke:
#     argo_rollouts:
#       enabled: true
#
# argo_rollouts:
#   enabled: null

# Datadog API integration — real-time metrics, monitors, APM
datadog:
  enabled: false                  # Set to true to enable Datadog API tools (or just set api_key + app_key — auto-enables)
  api_key: ""                     # Or use VAIG_DATADOG__API_KEY env var
  app_key: ""                     # Or use VAIG_DATADOG__APP_KEY env var
  site: ""                        # Default: datadoghq.com; override via VAIG_DATADOG__SITE
  timeout: ""                     # Default: 30s; override via VAIG_DATADOG__TIMEOUT
  # ssl_verify: true              # SSL verification for Datadog API connections. Override via VAIG_DATADOG__SSL_VERIFY.
  #                               # true (default) = standard SSL verification.
  #                               # false = disable SSL verification (for corporate proxies with SSL inspection — not recommended).
  #                               # "/path/to/ca-bundle.crt" = path to a custom CA bundle file (e.g. /etc/ssl/certs/corporate-ca.crt).

  # Configurable tag/label names used in Datadog metric queries and monitor filters.
  # Override these when your Datadog agent uses custom tag naming conventions.
  labels:
    cluster_name: "cluster_name"    # Tag name for the GKE cluster (default: cluster_name)
    service: "service"              # Tag name for the service (default: service)
    env: "env"                      # Tag name for the environment (default: env)
    version: "version"              # Tag name for the application version (default: version)
    namespace: "kube_namespace"     # Tag name for the Kubernetes namespace (default: kube_namespace)
    deployment: "kube_deployment"   # Tag name for the Kubernetes deployment (default: kube_deployment)
    pod_name: "pod_name"            # Tag name for the pod (used in "by {}" metric grouping)
    # custom: {}  # Add custom tag mappings here, e.g. {"team": "team_tag", "region": "region"}

  # Detection settings for identifying Datadog-instrumented workloads.
  # Override these when your cluster uses non-standard annotation or label prefixes.
  detection:
    annotation_prefixes:            # Annotation key prefixes that indicate Datadog instrumentation
      - "ad.datadoghq.com/"
      - "admission.datadoghq.com/"
    label_prefix: "tags.datadoghq.com/"  # Label key prefix for Datadog unified service tagging
    env_vars:                       # Environment variable names that indicate Datadog instrumentation
      - "DD_AGENT_HOST"
      - "DD_TRACE_AGENT_URL"
      - "DD_SERVICE"
      - "DD_ENV"
      - "DD_VERSION"
      - "DD_TRACE_ENABLED"
      - "DD_PROFILING_ENABLED"
      - "DD_LOGS_INJECTION"
      - "DD_RUNTIME_METRICS_ENABLED"

  # custom_metrics: {}  # Add custom metric query templates here.
  # Templates must include the {filters} placeholder for tag injection.
  # Example: {"my_metric": "avg:custom.metric{{{filters}}} by {{pod_name}}"}

  # metric_mode: "k8s_agent"  # Metric source: 'k8s_agent' (default) for kubernetes.* metrics
  #                           # (requires DaemonSet Agent with kubelet check), or 'apm' for
  #                           # trace.* metrics (APM-only setups without DaemonSet Agent).
  #                           # Override via VAIG_DATADOG__METRIC_MODE

  # cluster_name_override: ""  # Override the cluster_name tag value used in Datadog queries.
  #                            # When empty (default), the GKE cluster name is used as-is.
  #                            # Set this when the Datadog agent tags the cluster differently
  #                            # from the GKE cluster name (e.g. "prod-us-east" vs "gke-prod-us").
  #                            # Override via VAIG_DATADOG__CLUSTER_NAME_OVERRIDE

  # default_lookback_hours: 4.0  # Default lookback window (hours) for APM trace queries.
  #                              # Increase for low-traffic services where 1h yields no data.
  #                              # Override via VAIG_DATADOG__DEFAULT_LOOKBACK_HOURS

mcp:
  enabled: false                    # Set to true to enable MCP integration
  auto_register: false              # Auto-register MCP server tools into agent pipelines
  servers: []                       # List of MCP servers — example:
  # - name: "filesystem"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
  #   description: "Filesystem access via MCP"
  # - name: "github"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-github"]
  #   env:
  #     GITHUB_PERSONAL_ACCESS_TOKEN: "ghp_..."
  #   description: "GitHub API via MCP"

plugins:
  enabled: false                    # Set to true to enable Python plugin loading
  directories: []                   # Paths to directories containing plugin modules
  # - "./plugins"
  # - "~/.vaig/plugins"

# Tool effectiveness learning — automatic tool scoring based on historical call data
# When enabled, tools are scored and tiered (SKIP/DEPRIORITIZE/BOOST/ALLOW)
# based on failure rate and duration from recent runs.
effectiveness:
  enabled: false                      # Set to true to enable tool effectiveness scoring
  skip_threshold: 0.8                 # Failure rate above which a tool is skipped entirely
  deprioritize_threshold: 0.5         # Failure rate above which a tool gets a warning
  boost_threshold: 0.1                # Failure rate below which a reliable tool is boosted
  slow_tool_threshold_s: 10.0         # Avg duration (seconds) above which a tool is deprioritized
  min_calls_for_scoring: 3            # Minimum calls before scoring applies
  lookback_days: 7                    # Days of history to consider
  cache_ttl_seconds: 300              # Seconds to cache computed scores

# RAG data pipeline export — stream telemetry, tool calls, and health reports to GCP
# Requires: pip install 'vertex-ai-toolkit[rag]'  (google-cloud-bigquery + google-cloud-storage)
export:
  enabled: false                    # Set to true to enable GCP export (opt-in — safe to leave off)
  gcp_project_id: ""               # GCP project for BigQuery/GCS — required; if empty, BigQuery export is skipped
  bigquery_dataset: "vaig_analytics"  # BigQuery dataset name (created automatically if missing)
  auto_export_reports: false        # Automatically export HealthReport after each pipeline run
  auto_export_telemetry: false      # Automatically export telemetry events (higher volume — opt-in)
  gcs_bucket: ""                    # GCS bucket for raw export artifacts — required for GCS export
  gcs_prefix: "rag_data/"           # Key prefix for all objects written to GCS
  vertex_rag_corpus_id: ""          # Vertex AI RAG corpus ID (Phase 2 — leave empty for now)

safety:
  enabled: true                     # Set to false to skip sending safety settings entirely
  settings: []                      # List of safety settings — example:
  # Available categories:
  #   HARM_CATEGORY_HARASSMENT, HARM_CATEGORY_HATE_SPEECH,
  #   HARM_CATEGORY_SEXUALLY_EXPLICIT, HARM_CATEGORY_DANGEROUS_CONTENT,
  #   HARM_CATEGORY_CIVIC_INTEGRITY
  # Available thresholds:
  #   BLOCK_LOW_AND_ABOVE, BLOCK_MEDIUM_AND_ABOVE, BLOCK_ONLY_HIGH, BLOCK_NONE, OFF
  # Notes:
  #   - BLOCK_NONE/OFF may be rejected by some Vertex AI projects
  #   - HARM_CATEGORY_CIVIC_INTEGRITY is not supported in all regions
  # - category: "HARM_CATEGORY_HARASSMENT"
  #   threshold: "BLOCK_MEDIUM_AND_ABOVE"
  # - category: "HARM_CATEGORY_HATE_SPEECH"
  #   threshold: "BLOCK_MEDIUM_AND_ABOVE"
  # - category: "HARM_CATEGORY_SEXUALLY_EXPLICIT"
  #   threshold: "BLOCK_MEDIUM_AND_ABOVE"
  # - category: "HARM_CATEGORY_DANGEROUS_CONTENT"
  #   threshold: "BLOCK_MEDIUM_AND_ABOVE"

context_window:
  warn_threshold_pct: 80.0          # Percentage at which a WARNING is logged (default: 80%)
  error_threshold_pct: 95.0         # Percentage at which an ERROR is logged (default: 95%)
  context_window_size: 1048576      # Default context window size in tokens

# Audit logging — sends usage events to BigQuery and Cloud Logging
audit:
  enabled: false
  bigquery_dataset: "vaig_audit"
  bigquery_table: "audit_events"
  cloud_logging_log_name: "vaig-audit"
  buffer_size: 20
  flush_interval_seconds: 30

# Rate limiting — daily quota per user, policy loaded from GCS
# NOTE: Quota limits are NOT configured here (to prevent user manipulation).
# Set limits in the GCS quota policy file instead.
rate_limit:
  enabled: false
  policy_gcs_bucket: ""
  policy_gcs_path: "vaig/quota-policy.yaml"
  cache_ttl_seconds: 300

# Platform mode — centralized auth, config enforcement, admin management
# When enabled, CLI authenticates against a backend API and receives
# enforced configuration policies from the organization admin.
# Disabled by default — standalone mode is unchanged.
platform:
  enabled: false
  backend_url: ""

# Webhook server — receives Datadog alert webhooks and triggers vaig analysis
# Requires: pip install vertex-ai-toolkit[webhook]  (fastapi + uvicorn)
# Auto-enables when hmac_secret is set.
webhook_server:
  enabled: false
  host: "0.0.0.0"                    # Bind address — override via VAIG_WEBHOOK_SERVER__HOST
  port: 8080                          # Bind port — override via VAIG_WEBHOOK_SERVER__PORT or PORT env var
  hmac_secret: ""                     # Datadog HMAC secret — or use VAIG_WEBHOOK_SERVER__HMAC_SECRET
  max_analyses_per_day: 50            # Daily budget (cost protection against alert storms)
  dedup_cooldown_seconds: 300         # Seconds before re-analyzing the same alert (5 min)
  analysis_timeout_seconds: 600       # Maximum seconds per analysis (10 min)

# Scheduled health scans — runs `vaig discover` on a cron/interval schedule
# and alerts when new issues are found above the severity threshold.
# Auto-enables when targets are configured.
schedule:
  enabled: false
  default_interval_minutes: 30          # Interval between scans (used when no cron expression is set)
  cron_expression: ""                   # Cron expression (overrides interval when set)
  targets: []                           # List of {cluster_name, namespace, all_namespaces, skip_healthy}
  alert_severity_threshold: "HIGH"      # Only alert on findings >= this severity
  daily_max_analyses: 48                # Daily budget across all schedules
  per_schedule_max_analyses: null       # Per-schedule daily budget (null = unlimited)
  max_concurrent_scans: 1              # Maximum concurrent scan executions
  store_results: true                   # Store scan results for history/diffing
  misfire_grace_time: 900               # Seconds to tolerate a missed job trigger (15 min)
  db_path: "~/.vaig/scheduler.db"       # SQLite path for schedule metadata, budget tracking, and run history

# Jira Cloud integration — export health-report findings as Jira issues
# Auto-enables when base_url is set.
jira:
  enabled: false
  base_url: ""                        # Jira Cloud URL — e.g. https://myorg.atlassian.net — or use VAIG_JIRA__BASE_URL
  email: ""                           # Jira Cloud email — or use VAIG_JIRA__EMAIL
  api_token: ""                       # Jira Cloud API token — or use VAIG_JIRA__API_TOKEN
  project_key: ""                     # Target project key (e.g. "OPS") — or use VAIG_JIRA__PROJECT_KEY
  issue_type: "Bug"                   # Default issue type for new findings
  severity_field_mapping:             # Map finding severity → Jira priority name
    CRITICAL: Highest
    HIGH: High
    MEDIUM: Medium
    LOW: Low
    INFO: Lowest

# PagerDuty integration — incident management via Events API v2 + REST API v2
# Events API v2 uses routing_key for trigger/ack/resolve.
# REST API v2 uses api_token for enrichment (notes, incident search).
# Auto-enables when routing_key is set.
pagerduty:
  enabled: false
  routing_key: ""                     # Events API v2 routing key — or use VAIG_PAGERDUTY__ROUTING_KEY
  api_token: ""                       # REST API v2 token (optional) — or use VAIG_PAGERDUTY__API_TOKEN
  service_id: ""                      # PagerDuty service ID (for reference only)
  auto_create_incident: true          # Auto-create incidents when health issues are detected
  severity_mapping:                   # Map report severity → PagerDuty severity
    critical: critical
    high: error
    medium: warning
    info: info
  # Alert correlation fields (read-only fetch from PD REST API)
  alert_service_ids: []               # Filter incidents to these PD service IDs (empty = all services)
  alert_fetch_limit: 25               # Maximum incidents returned by list_pagerduty_incidents tool

# Google Chat integration — incoming webhook for Card v2 notifications
# Auto-enables when webhook_url is set.
google_chat:
  enabled: false
  webhook_url: ""                     # Webhook URL — or use VAIG_GOOGLE_CHAT__WEBHOOK_URL
  notify_on:                          # Only send notifications for these severities (and above)
    - critical
    - high

# Slack integration — incoming webhook for Block Kit notifications
# Auto-enables when webhook_url is set.
slack:
  enabled: false
  webhook_url: ""                     # Webhook URL — or use VAIG_SLACK__WEBHOOK_URL
  notify_on:                          # Only send notifications for these severities (and above)
    - critical
    - high
  # Alert correlation fields (read-only Slack conversations.history)
  bot_token: ""                       # Slack Bot OAuth token for reading channel history — or use VAIG_SLACK__BOT_TOKEN

# OpsGenie integration — alert correlation via OpsGenie v2 API
# Auto-enables when api_key is set.
opsgenie:
  enabled: false
  api_key: ""                         # OpsGenie API key — or use VAIG_OPSGENIE__API_KEY
  base_url: "https://api.opsgenie.com"  # US region; use "https://api.eu.opsgenie.com" for EU
  team_ids: []                        # Filter alerts to these team IDs (empty = all teams)
  alert_fetch_limit: 25               # Maximum alerts returned by list_opsgenie_alerts tool

# Email (SMTP) integration — sends HTML + plain-text alerts and reports
# Auto-enables when smtp_host, from_address, and recipients are all set.
email:
  enabled: false
  smtp_host: ""                       # SMTP server hostname — or use VAIG_EMAIL__SMTP_HOST
  smtp_port: 587                      # 587 for STARTTLS, 465 for implicit SSL
  username: ""                        # SMTP username — or use VAIG_EMAIL__USERNAME
  password: ""                        # SMTP password — or use VAIG_EMAIL__PASSWORD
  from_address: ""                    # Sender email — or use VAIG_EMAIL__FROM_ADDRESS
  recipients: []                      # List of recipient emails — or use VAIG_EMAIL__RECIPIENTS as JSON, e.g. '["a@example.com","b@example.com"]'
  use_tls: true                       # Enable TLS encryption (STARTTLS on 587, SMTP_SSL on 465)
  timeout: 30                         # SMTP connection timeout in seconds
  notify_on:                          # Only send notifications for these severities (and above)
    - critical
    - high

# Fine-tuning pipeline — extract rated examples from BigQuery, build JSONL, submit tuning jobs
# Requires: pip install 'vertex-ai-toolkit[rag]'  (google-cloud-bigquery + google-cloud-storage)

# Fleet scanning — scan multiple GKE clusters in one command with cross-cluster correlation
# Auto-enables when clusters list is non-empty.
# Example:
#   fleet:
#     parallel: true
#     max_workers: 4
#     daily_budget_usd: 5.0
#     clusters:
#       - name: "production-us"
#         cluster_name: "gke-prod-us-central1"
#         project_id: "my-project"
#         location: "us-central1"
#         all_namespaces: true
#         skip_healthy: true
#       - name: "production-eu"
#         cluster_name: "gke-prod-europe-west1"
#         project_id: "my-project"
#         location: "europe-west1"
#         namespace: "critical-services"
fleet:
  enabled: false
  clusters: []
  parallel: false
  max_workers: 4
  daily_budget_usd: 0.0

# Remediation engine — safety-tiered command execution for runbook automation
# Feature-flagged: disabled by default.  Enable explicitly with
# remediation.enabled = true in config or VAIG_REMEDIATION__ENABLED=true.
remediation:
  enabled: false                        # Master feature flag — must be explicitly enabled
  auto_approve_safe: false              # When true, SAFE-tier commands execute without user confirmation
  blocked_commands: []                  # Regex patterns for commands that should ALWAYS be BLOCKED
  timeout: 30                           # Execution timeout in seconds per command
  dry_run: false                        # When true, all commands show plan without executing
  tier_overrides: {}                    # Map of regex pattern → tier name (safe/review/blocked)

training:
  enabled: false                      # Set to true to enable fine-tuning pipeline (opt-in)
  base_model: "gemini-2.5-flash"       # Base model ID for supervised tuning
  min_examples: 50                    # Minimum training examples required
  max_examples: 10000                 # Maximum training examples to include
  min_rating: 4                       # Minimum feedback rating to include (1-5)
