<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Service Health Report — payment-service @ prod-gke-us-central1</title>
<style>
  /* ── Reset & Base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:    #1a1b26;
    --bg-surface: #24283b;
    --bg-muted:   #414868;
    --bg-hover:   #2f3549;
    --text-main:  #c0caf5;
    --text-dim:   #787c99;
    --text-bright:#e1e3f4;
    --border:     #3b3f5c;

    --critical: #f7768e;
    --high:     #ff9e64;
    --medium:   #e0af68;
    --low:      #7aa2f7;
    --info:     #7dcfff;
    --healthy:  #9ece6a;
    --degraded: #e0af68;
    --failed:   #f7768e;
    --unknown:  #787c99;

    --sidebar-w: 220px;
    --header-h:  56px;
    --radius:    8px;
    --font-mono: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
    --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --transition: 150ms ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-base);
    color: var(--text-main);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Scrollbar ──────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: var(--bg-muted); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #5a617e; }

  /* ── Top Header ─────────────────────────────────────────── */
  .top-header {
    position: sticky; top: 0; z-index: 100;
    height: var(--header-h);
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 20px; gap: 16px;
  }
  .top-header .brand {
    font-size: 14px; font-weight: 700;
    color: var(--text-bright); letter-spacing: .4px;
    flex-shrink: 0;
  }
  .top-header .brand span { color: var(--info); }
  .top-header .cluster-info {
    font-size: 12px; color: var(--text-dim);
    font-family: var(--font-mono); flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 700; letter-spacing: .6px;
    text-transform: uppercase; flex-shrink: 0;
  }
  .status-badge.CRITICAL { background: color-mix(in srgb, var(--critical) 20%, transparent); color: var(--critical); border: 1px solid color-mix(in srgb, var(--critical) 40%, transparent); }
  .status-badge.DEGRADED { background: color-mix(in srgb, var(--degraded) 20%, transparent); color: var(--degraded); border: 1px solid color-mix(in srgb, var(--degraded) 40%, transparent); }
  .status-badge.HEALTHY  { background: color-mix(in srgb, var(--healthy) 20%, transparent);  color: var(--healthy);  border: 1px solid color-mix(in srgb, var(--healthy) 40%, transparent); }
  .status-badge.UNKNOWN  { background: color-mix(in srgb, var(--unknown) 20%, transparent);  color: var(--unknown);  border: 1px solid color-mix(in srgb, var(--unknown) 40%, transparent); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .status-badge.CRITICAL .status-dot { animation: pulse-crit 1.2s ease-in-out infinite; }
  @keyframes pulse-crit {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .4; transform: scale(1.4); }
  }
  .generated-at { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }

  /* ── Layout ─────────────────────────────────────────────── */
  .layout {
    display: flex; flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    position: sticky; top: var(--header-h);
    height: calc(100vh - var(--header-h));
    overflow-y: auto; padding: 20px 0;
  }
  .sidebar-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-dim);
    padding: 0 16px 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; cursor: pointer;
    font-size: 13px; color: var(--text-main);
    border-left: 2px solid transparent;
    transition: all var(--transition);
    text-decoration: none;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text-bright); }
  .nav-item.active { border-left-color: var(--info); color: var(--info); background: var(--bg-hover); }
  .nav-icon { width: 16px; text-align: center; font-size: 14px; flex-shrink: 0; }
  .nav-count {
    margin-left: auto; font-size: 10px; padding: 2px 6px;
    border-radius: 10px; background: var(--bg-muted); color: var(--text-dim);
  }
  .nav-count.critical { background: color-mix(in srgb, var(--critical) 25%, transparent); color: var(--critical); }
  .nav-divider { height: 1px; background: var(--border); margin: 10px 16px; }

  /* Severity filter pills in sidebar */
  .filter-section { padding: 12px 16px 0; }
  .filter-section-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .filter-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .filter-pill {
    padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent;
    transition: all var(--transition); user-select: none;
  }
  .filter-pill[data-sev="CRITICAL"] { color: var(--critical); border-color: color-mix(in srgb, var(--critical) 40%, transparent); background: color-mix(in srgb, var(--critical) 15%, transparent); }
  .filter-pill[data-sev="HIGH"]     { color: var(--high);     border-color: color-mix(in srgb, var(--high) 40%, transparent);     background: color-mix(in srgb, var(--high) 15%, transparent); }
  .filter-pill[data-sev="MEDIUM"]   { color: var(--medium);   border-color: color-mix(in srgb, var(--medium) 40%, transparent);   background: color-mix(in srgb, var(--medium) 15%, transparent); }
  .filter-pill[data-sev="LOW"]      { color: var(--low);      border-color: color-mix(in srgb, var(--low) 40%, transparent);      background: color-mix(in srgb, var(--low) 15%, transparent); }
  .filter-pill[data-sev="INFO"]     { color: var(--info);     border-color: color-mix(in srgb, var(--info) 40%, transparent);     background: color-mix(in srgb, var(--info) 15%, transparent); }
  .filter-pill.inactive { opacity: .35; }

  /* ── Main content ─────────────────────────────────────────── */
  .main { flex: 1; overflow-y: auto; padding: 24px; max-width: 1200px; }
  section { margin-bottom: 32px; scroll-margin-top: calc(var(--header-h) + 20px); }
  section h2 {
    font-size: 16px; font-weight: 700; color: var(--text-bright);
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  section h2 .section-icon { font-size: 18px; }

  /* ── Cards ──────────────────────────────────────────────── */
  .card {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .card-body { padding: 16px; }

  /* ── Stat grid ───────────────────────────────────────────── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-label { font-size: 11px; color: var(--text-dim); letter-spacing: .5px; text-transform: uppercase; }
  .stat-value { font-size: 28px; font-weight: 800; line-height: 1; }
  .stat-value.critical { color: var(--critical); }
  .stat-value.warning  { color: var(--high); }
  .stat-value.healthy  { color: var(--healthy); }
  .stat-value.info     { color: var(--info); }
  .stat-sub { font-size: 12px; color: var(--text-dim); }

  .summary-text {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    font-size: 14px; color: var(--text-main); line-height: 1.7;
    border-left: 3px solid var(--critical);
  }

  /* ── Service Status Grid ─────────────────────────────────── */
  .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .service-card {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .service-card.FAILED   { border-left: 3px solid var(--failed); }
  .service-card.DEGRADED { border-left: 3px solid var(--degraded); }
  .service-card.HEALTHY  { border-left: 3px solid var(--healthy); }
  .service-card.UNKNOWN  { border-left: 3px solid var(--unknown); }
  .service-header { display: flex; align-items: center; gap: 10px; }
  .service-status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .service-status-dot.HEALTHY  { background: var(--healthy); }
  .service-status-dot.DEGRADED { background: var(--degraded); }
  .service-status-dot.FAILED   { background: var(--failed); animation: pulse-crit 1.2s ease-in-out infinite; }
  .service-status-dot.UNKNOWN  { background: var(--unknown); }
  .service-name { font-weight: 700; color: var(--text-bright); font-size: 14px; flex: 1; }
  .service-ns { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
  .service-status-label { font-size: 11px; font-weight: 700; letter-spacing: .4px; }
  .service-status-label.HEALTHY  { color: var(--healthy); }
  .service-status-label.DEGRADED { color: var(--degraded); }
  .service-status-label.FAILED   { color: var(--failed); }
  .service-status-label.UNKNOWN  { color: var(--unknown); }
  .service-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .service-metric { text-align: center; padding: 6px 4px; background: var(--bg-base); border-radius: 4px; }
  .service-metric-val { font-size: 14px; font-weight: 700; color: var(--text-bright); font-family: var(--font-mono); }
  .service-metric-val.warn { color: var(--high); }
  .service-metric-val.crit { color: var(--critical); }
  .service-metric-lbl { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .service-issues { font-size: 12px; color: var(--critical); background: color-mix(in srgb, var(--critical) 10%, transparent); border-radius: 4px; padding: 6px 10px; }
  .no-issues { font-size: 12px; color: var(--healthy); }

  /* ── Findings ─────────────────────────────────────────────── */
  .finding-card {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
    transition: opacity var(--transition);
  }
  .finding-card.hidden { display: none; }
  .finding-card[data-sev="CRITICAL"] { border-left: 3px solid var(--critical); }
  .finding-card[data-sev="HIGH"]     { border-left: 3px solid var(--high); }
  .finding-card[data-sev="MEDIUM"]   { border-left: 3px solid var(--medium); }
  .finding-card[data-sev="LOW"]      { border-left: 3px solid var(--low); }
  .finding-card[data-sev="INFO"]     { border-left: 3px solid var(--info); }
  .finding-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer;
    transition: background var(--transition);
  }
  .finding-header:hover { background: var(--bg-hover); }
  .sev-pill {
    font-size: 10px; font-weight: 800; letter-spacing: .6px;
    padding: 3px 8px; border-radius: 3px; text-transform: uppercase; flex-shrink: 0;
  }
  .sev-pill.CRITICAL { background: color-mix(in srgb, var(--critical) 25%, transparent); color: var(--critical); }
  .sev-pill.HIGH     { background: color-mix(in srgb, var(--high) 25%, transparent);     color: var(--high); }
  .sev-pill.MEDIUM   { background: color-mix(in srgb, var(--medium) 25%, transparent);   color: var(--medium); }
  .sev-pill.LOW      { background: color-mix(in srgb, var(--low) 25%, transparent);       color: var(--low); }
  .sev-pill.INFO     { background: color-mix(in srgb, var(--info) 25%, transparent);      color: var(--info); }
  .finding-title { font-weight: 600; color: var(--text-bright); font-size: 14px; flex: 1; }
  .finding-service { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
  .finding-chevron { color: var(--text-dim); font-size: 12px; transition: transform var(--transition); flex-shrink: 0; }
  .finding-card.open .finding-chevron { transform: rotate(90deg); }
  .finding-body { padding: 0 16px 16px; display: none; }
  .finding-card.open .finding-body { display: block; }
  .finding-row { margin-bottom: 10px; }
  .finding-row-label { font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
  .finding-row-val { font-size: 13px; color: var(--text-main); }
  .confidence-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 3px; letter-spacing: .4px;
  }
  .confidence-badge.CONFIRMED { background: color-mix(in srgb, var(--healthy) 25%, transparent); color: var(--healthy); }
  .confidence-badge.HIGH      { background: color-mix(in srgb, var(--high) 25%, transparent);    color: var(--high); }
  .confidence-badge.MEDIUM    { background: color-mix(in srgb, var(--medium) 25%, transparent);  color: var(--medium); }
  .confidence-badge.LOW       { background: color-mix(in srgb, var(--low) 25%, transparent);     color: var(--low); }
  .evidence-list { list-style: none; }
  .evidence-list li { position: relative; padding-left: 14px; margin-bottom: 4px; font-size: 13px; color: var(--text-main); }
  .evidence-list li::before { content: "›"; position: absolute; left: 0; color: var(--text-dim); }
  pre.evidence-block {
    background: var(--bg-base); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px 14px;
    font-family: var(--font-mono); font-size: 12px; color: var(--text-main);
    overflow-x: auto; white-space: pre; margin-top: 8px; line-height: 1.5;
  }
  .affected-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .affected-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--bg-muted); color: var(--text-main); font-family: var(--font-mono);
  }

  /* ── Timeline ─────────────────────────────────────────────── */
  .timeline { position: relative; padding-left: 28px; }
  .timeline::before {
    content: ""; position: absolute; left: 10px; top: 4px; bottom: 0;
    width: 2px; background: var(--border);
  }
  .tl-event { position: relative; margin-bottom: 18px; }
  .tl-dot {
    position: absolute; left: -24px; top: 3px;
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid var(--bg-surface); z-index: 1;
  }
  .tl-dot.CRITICAL { background: var(--critical); box-shadow: 0 0 6px var(--critical); }
  .tl-dot.HIGH     { background: var(--high);     box-shadow: 0 0 6px var(--high); }
  .tl-dot.MEDIUM   { background: var(--medium); }
  .tl-dot.LOW      { background: var(--low); }
  .tl-dot.INFO     { background: var(--info); }
  .tl-time { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-bottom: 2px; }
  .tl-service { display: inline-block; font-size: 11px; font-family: var(--font-mono); margin-right: 6px; color: var(--info); }
  .tl-text { font-size: 13px; color: var(--text-main); }
  .tl-sev-badge { display: inline-block; font-size: 10px; font-weight: 700; margin-left: 6px; padding: 1px 5px; border-radius: 2px; vertical-align: middle; }
  .tl-sev-badge.CRITICAL { background: color-mix(in srgb, var(--critical) 20%, transparent); color: var(--critical); }
  .tl-sev-badge.HIGH     { background: color-mix(in srgb, var(--high) 20%, transparent);     color: var(--high); }
  .tl-sev-badge.MEDIUM   { background: color-mix(in srgb, var(--medium) 20%, transparent);   color: var(--medium); }
  .tl-sev-badge.LOW      { background: color-mix(in srgb, var(--low) 20%, transparent);       color: var(--low); }
  .tl-sev-badge.INFO     { background: color-mix(in srgb, var(--info) 20%, transparent);      color: var(--info); }

  /* ── Cluster Overview table ──────────────────────────────── */
  .metrics-table { width: 100%; border-collapse: collapse; }
  .metrics-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .metrics-table tr:last-child td { border-bottom: none; }
  .metrics-table td:first-child { color: var(--text-dim); width: 40%; font-weight: 600; }
  .metrics-table td:last-child { font-family: var(--font-mono); color: var(--text-bright); }
  .metrics-table tr:hover td { background: var(--bg-hover); }

  /* ── Recommendations ─────────────────────────────────────── */
  .rec-card {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; padding: 16px;
  }
  .rec-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .rec-priority {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800;
    background: var(--bg-muted); color: var(--text-bright);
  }
  .rec-priority.p1 { background: color-mix(in srgb, var(--critical) 25%, transparent); color: var(--critical); }
  .rec-priority.p2 { background: color-mix(in srgb, var(--high) 25%, transparent);     color: var(--high); }
  .rec-priority.p3 { background: color-mix(in srgb, var(--medium) 25%, transparent);   color: var(--medium); }
  .rec-title { font-weight: 700; color: var(--text-bright); font-size: 14px; flex: 1; }
  .rec-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .urgency-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px;
    letter-spacing: .4px; text-transform: uppercase;
  }
  .urgency-badge.IMMEDIATE  { background: color-mix(in srgb, var(--critical) 25%, transparent); color: var(--critical); }
  .urgency-badge.SHORT_TERM { background: color-mix(in srgb, var(--high) 25%, transparent);     color: var(--high); }
  .urgency-badge.LONG_TERM  { background: color-mix(in srgb, var(--info) 20%, transparent);     color: var(--info); }
  .effort-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px;
    letter-spacing: .4px; text-transform: uppercase;
  }
  .effort-badge.LOW    { background: color-mix(in srgb, var(--healthy) 20%, transparent); color: var(--healthy); }
  .effort-badge.MEDIUM { background: color-mix(in srgb, var(--medium) 20%, transparent);  color: var(--medium); }
  .effort-badge.HIGH   { background: color-mix(in srgb, var(--high) 20%, transparent);    color: var(--high); }
  .rec-body { margin-top: 8px; font-size: 13px; color: var(--text-main); }
  .rec-cmd {
    margin-top: 10px; background: var(--bg-base); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px 14px;
    font-family: var(--font-mono); font-size: 12px; color: var(--healthy);
    display: flex; align-items: flex-start; gap: 8px; position: relative; overflow: hidden;
  }
  .rec-cmd::before { content: "$"; color: var(--text-dim); flex-shrink: 0; }
  .rec-cmd code { flex: 1; white-space: pre-wrap; word-break: break-all; }
  .copy-btn {
    position: absolute; right: 8px; top: 8px;
    background: var(--bg-muted); border: none; color: var(--text-dim);
    border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer;
    transition: all var(--transition);
  }
  .copy-btn:hover { background: var(--bg-hover); color: var(--text-bright); }
  .copy-btn.copied { color: var(--healthy); }
  .rec-why { margin-top: 8px; font-size: 12px; color: var(--text-dim); }
  .rec-why strong { color: var(--text-main); }
  .rec-risk { margin-top: 4px; font-size: 12px; }
  .rec-risk strong { color: var(--high); }

  /* ── Root Cause ───────────────────────────────────────────── */
  .hyp-card {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; padding: 16px;
    border-left: 3px solid var(--medium);
  }
  .hyp-title { font-weight: 700; color: var(--text-bright); font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .hyp-row { margin-bottom: 8px; font-size: 13px; }
  .hyp-row .label { font-weight: 700; color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }

  /* ── Collapsible sections ─────────────────────────────────── */
  .section-toggle {
    cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 8px;
  }
  .section-toggle::after {
    content: "▾"; font-size: 12px; color: var(--text-dim);
    transition: transform var(--transition); margin-left: auto;
  }
  .collapsed + .section-content { display: none; }
  .section-toggle.collapsed::after { transform: rotate(-90deg); }

  /* ── Responsive ──────────────────────────────────────────── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .service-grid { grid-template-columns: 1fr; }
    .service-metrics { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── Tooltip ─────────────────────────────────────────────── */
  [data-tip] { position: relative; }
  [data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%);
    background: #0d0e17; color: var(--text-bright); border: 1px solid var(--border);

  const m = {CRITICAL:'critical',HIGH:'high',MEDIUM:'medium',LOW:'low',INFO:'info',HEALTHY:'healthy',DEGRADED:'degraded',FAILED:'failed',UNKNOWN:'unknown'};
  return m[s] || 'unknown';
}

// ── Header ──────────────────────────────────────────────────────
function renderHeader() {
  const m = REPORT_DATA.metadata;
  const es = REPORT_DATA.executive_summary;
  document.getElementById('cluster-info-text').textContent =
    `${m.project_id} / ${m.cluster_name}  •  ${es.scope}  •  model: ${m.model_used}`;
  const badge = document.getElementById('status-badge');
  badge.className = 'status-badge ' + es.overall_status;
  document.getElementById('status-text').textContent = es.overall_status;
  document.getElementById('generated-at').textContent = 'Report: ' + m.generated_at.replace('T',' ').replace('Z',' UTC');
}

// ── Stat grid ────────────────────────────────────────────────────
function renderStats() {
  const es = REPORT_DATA.executive_summary;
  const data = [
    { label: 'Overall Status', value: es.overall_status, cls: sevColor(es.overall_status), sub: es.scope },
    { label: 'Services Checked', value: es.services_checked, cls: 'info', sub: 'in namespace' },
    { label: 'Issues Found', value: es.issues_found, cls: 'warning', sub: 'findings' },
    { label: 'Critical', value: es.critical_count, cls: 'critical', sub: 'severity' },
    { label: 'Warnings', value: es.warning_count, cls: 'warning', sub: 'high/medium' },
    { label: 'Healthy', value: REPORT_DATA.service_statuses.filter(s=>s.status==='HEALTHY').length, cls: 'healthy', sub: 'services ok' },
  ];
  document.getElementById('stat-grid').innerHTML = data.map(d=>
    `<div class="stat-card">
      <div class="stat-label">${esc(d.label)}</div>
      <div class="stat-value ${d.cls}">${esc(d.value)}</div>
      <div class="stat-sub">${esc(d.sub)}</div>
    </div>`
  ).join('');
  document.getElementById('summary-text').textContent = es.summary_text;
}

// ── Cluster overview ──────────────────────────────────────────────
function renderCluster() {
  document.getElementById('cluster-table').innerHTML = REPORT_DATA.cluster_overview.map(r=>
    `<tr><td>${esc(r.metric)}</td><td>${esc(r.value)}</td></tr>`

}

    const cpuWarn = s.cpu_usage && (() => { try { const parts = s.cpu_usage.split('/'); const u = parseInt(parts[0]); const l = parseInt(parts[1]); return (u/l) > 0.75; } catch(e){ return false; }})();
    const restartsCrit = parseInt(s.restarts_1h) > 10;
    const restartsWarn = parseInt(s.restarts_1h) > 3;

    return `<div class="service-card ${esc(s.status)}">
      <div class="service-header">
        <div class="service-status-dot ${esc(s.status)}"></div>
        <div>
          <div class="service-name">${esc(s.service)}</div>
          <div class="service-ns">${esc(s.namespace)}</div>
        </div>
        <div class="service-status-label ${esc(s.status)}">${esc(s.status)}</div>
      </div>
      <div class="service-metrics">
        <div class="service-metric">
          <div class="service-metric-val${s.pods_ready && s.pods_ready.startsWith('0/') ? ' crit' : ''}">${esc(s.pods_ready)}</div>
          <div class="service-metric-lbl">Pods Ready</div>
        </div>
        <div class="service-metric">
          <div class="service-metric-val${restartsCrit ? ' crit' : restartsWarn ? ' warn' : ''}">${esc(s.restarts_1h)}</div>
          <div class="service-metric-lbl">Restarts/h</div>
        </div>
        <div class="service-metric">
          <div class="service-metric-val${cpuWarn ? ' warn' : ''}">${esc(s.cpu_usage.split('/')[0].trim())}</div>
          <div class="service-metric-lbl">CPU</div>
        </div>
        <div class="service-metric">
          <div class="service-metric-val${memWarn ? ' crit' : ''}">${esc(s.memory_usage.split('/')[0].trim())}</div>
          <div class="service-metric-lbl">Memory</div>
        </div>
      </div>
      ${s.issues ? `<div class="service-issues">⚠ ${esc(s.issues)}</div>` : '<div class="no-issues">✓ No active issues</div>'}
    </div>`;
  }).join('');
}

// ── Findings ──────────────────────────────────────────────────────
const activeSeverities = new Set(['CRITICAL','HIGH','MEDIUM','LOW','INFO']);

function renderFindings() {
  const findings = REPORT_DATA.findings;
  document.getElementById('nav-findings-count').textContent = findings.length;

  const container = document.getElementById('findings-list');
  container.innerHTML = findings.map((f, i) => {
    const evHTML = f.evidence.map(e => {
      if (e.includes('\n')) {
        return `<pre class="evidence-block">${esc(e)}</pre>`;
      }
      return `<li>${esc(e)}</li>`;
    }).join('');

    const affectedHTML = f.affected_resources.map(r =>
      `<span class="affected-tag">${esc(r)}</span>`
    ).join('');

    return `<div class="finding-card" data-sev="${esc(f.severity)}" data-id="${esc(f.id)}" id="finding-${esc(f.id)}">
      <div class="finding-header" onclick="toggleFinding(this.parentElement)">
        <span class="sev-pill ${esc(f.severity)}">${esc(f.severity)}</span>
        <span class="finding-title">${esc(f.title)}</span>
        ${f.service ? `<span class="finding-service">${esc(f.service)}</span>` : ''}
        <span class="finding-chevron">▶</span>
      </div>
      <div class="finding-body">
        ${f.description ? `<div class="finding-row"><div class="finding-row-label">What</div><div class="finding-row-val">${esc(f.description)}</div></div>` : ''}
        ${f.root_cause ? `<div class="finding-row"><div class="finding-row-label">Root Cause</div><div class="finding-row-val">${esc(f.root_cause)}</div></div>` : ''}
        ${f.evidence.length ? `<div class="finding-row"><div class="finding-row-label">Evidence</div><ul class="evidence-list">${evHTML}</ul></div>` : ''}
        <div class="finding-row" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
          <div><div class="finding-row-label">Confidence</div><span class="confidence-badge ${esc(f.confidence)}">${esc(f.confidence)}</span></div>
          ${f.category ? `<div><div class="finding-row-label">Category</div><span style="font-size:12px;color:var(--text-dim)">${esc(f.category)}</span></div>` : ''}
        </div>
        ${f.impact ? `<div class="finding-row"><div class="finding-row-label">Impact</div><div class="finding-row-val">${esc(f.impact)}</div></div>` : ''}
        ${affectedHTML ? `<div class="finding-row"><div class="finding-row-label">Affected Resources</div><div class="affected-tags">${affectedHTML}</div></div>` : ''}
        ${f.remediation ? `<div class="finding-row"><div class="finding-row-label">Quick Remediation</div><div class="finding-row-val" style="color:var(--healthy)">${esc(f.remediation)}</div></div>` : ''}
      </div>
    </div>`;
  }).join('');

  // auto-open critical
  document.querySelectorAll('.finding-card[data-sev="CRITICAL"]').forEach(c => {
    c.classList.add('open');
  });

  // init filter pills
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.addEventListener('click', () => toggleSeverityFilter(p.dataset.sev));
  });
}

function toggleFinding(card) {
  card.classList.toggle('open');
}

function toggleSeverityFilter(sev) {
  if (activeSeverities.has(sev)) {
    activeSeverities.delete(sev);
  } else {
    activeSeverities.add(sev);
  }
  // Update pills
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.classList.toggle('inactive', !activeSeverities.has(p.dataset.sev));
  });
  // Show/hide finding cards
  document.querySelectorAll('.finding-card').forEach(card => {
    card.classList.toggle('hidden', !activeSeverities.has(card.dataset.sev));
  });
}

// ── Root Cause ────────────────────────────────────────────────────
function renderRootCause() {
  const hyps = REPORT_DATA.root_cause_hypotheses;
  document.getElementById('rootcause-list').innerHTML = hyps.map(h => {
    const evList = h.supporting_evidence.map(e => `<li>${esc(e)}</li>`).join('');
    return `<div class="hyp-card">
      <div class="hyp-title">
        <span>🔬</span> ${esc(h.finding_title)}
        <span class="confidence-badge ${esc(h.confidence)}" style="margin-left:auto">${esc(h.confidence)}</span>
      </div>
      <div class="hyp-row"><div class="label">Mechanism</div><div style="font-size:13px;color:var(--text-main)">${esc(h.mechanism)}</div></div>
      ${evList ? `<div class="hyp-row"><div class="label">Supporting Evidence</div><ul class="evidence-list">${evList}</ul></div>` : ''}
      <div class="hyp-row"><div class="label">What Would Confirm</div><div style="font-size:13px;color:var(--info)">${esc(h.what_would_confirm)}</div></div>
    </div>`;
  }).join('');
}

// ── Timeline ──────────────────────────────────────────────────────
function renderTimeline() {
  const events = REPORT_DATA.timeline;
  document.getElementById('nav-timeline-count').textContent = events.length;

  document.getElementById('timeline-list').innerHTML = events.map(e =>
    `<div class="tl-event">
      <div class="tl-dot ${esc(e.severity)}"></div>
      <div class="tl-time">${esc(e.time)}</div>
      <div>
        ${e.service ? `<span class="tl-service">[${esc(e.service)}]</span>` : ''}
        <span class="tl-text">${esc(e.event)}</span>
        <span class="tl-sev-badge ${esc(e.severity)}">${esc(e.severity)}</span>
      </div>
    </div>`
  ).join('');
}

// ── Recommendations ────────────────────────────────────────────────
function renderRecs() {
  const recs = REPORT_DATA.recommendations;
  document.getElementById('nav-recs-count').textContent = recs.length;

  const urgencyOrder = ['IMMEDIATE','SHORT_TERM','LONG_TERM'];
  const urgencyLabels = { IMMEDIATE: '🚨 Immediate (next 5 min)', SHORT_TERM: '⚡ Short-term (next 1h)', LONG_TERM: '📋 Long-term (next sprint)' };
  let html = '';

  urgencyOrder.forEach(urg => {
    const group = recs.filter(r => r.urgency === urg).sort((a,b) => a.priority - b.priority);
    if (!group.length) return;
    html += `<div class="urgency-header"><span class="urgency-badge ${urg}">${urg.replace('_',' ')}</span> ${urgencyLabels[urg]}</div>`;
    html += group.map(r => {
      const pCls = r.priority <= 2 ? `p${r.priority}` : '';
      const cmdLines = r.command.split('\n').filter(l => !l.startsWith('#')).join('\n').trim();
      return `<div class="rec-card">
        <div class="rec-header">
          <div class="rec-priority ${pCls}">${r.priority}</div>
          <div>
            <div class="rec-title">${esc(r.title)}</div>
            <div class="rec-badges" style="margin-top:6px">
              <span class="urgency-badge ${esc(r.urgency)}">${esc(r.urgency.replace('_',' '))}</span>
              <span class="effort-badge ${esc(r.effort)}">effort: ${esc(r.effort)}</span>
            </div>
          </div>
        </div>
        ${r.description ? `<div class="rec-body">${esc(r.description)}</div>` : ''}
        ${cmdLines ? `<div class="rec-cmd" id="cmd-${r.priority}">
          <code>${esc(cmdLines)}</code>
          <button class="copy-btn" onclick="copyCmd(this, ${r.priority})">copy</button>
        </div>` : ''}
        ${r.why ? `<div class="rec-why"><strong>Why:</strong> ${esc(r.why)}</div>` : ''}
        ${r.risk ? `<div class="rec-risk"><strong style="color:var(--high)">Risk:</strong> <span style="color:var(--text-dim)">${esc(r.risk)}</span></div>` : ''}
      </div>`;
    }).join('');
  });

  document.getElementById('recs-list').innerHTML = html;
}

// ── Copy command ──────────────────────────────────────────────────
function copyCmd(btn, priority) {
  const rec = REPORT_DATA.recommendations.find(r => r.priority === priority);
  if (!rec) return;
  const text = rec.command.split('\n').filter(l => !l.startsWith('#')).join('\n').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// ── Section toggle (collapse) ─────────────────────────────────────
function toggleSection(toggle) {
  toggle.classList.toggle('collapsed');
}

// ── Sidebar nav active ────────────────────────────────────────────
function setActiveNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

// Update active nav on scroll
function updateActiveNav() {
  const sections = document.querySelectorAll('section[id]');
  const scrollTop = document.getElementById('main-content').scrollTop + 80;
  let current = '';
  sections.forEach(s => {
    if (s.offsetTop <= scrollTop) current = s.id;
  });
  if (current) {
    document.querySelectorAll('.nav-item').forEach(n => {
      const href = n.getAttribute('href');
      n.classList.toggle('active', href === '#' + current);
    });
  }
}

document.getElementById('main-content').addEventListener('scroll', updateActiveNav, { passive: true });

// ── Init ──────────────────────────────────────────────────────────
(function init() {
  renderHeader();
  renderStats();
  renderCluster();
  renderServices();
  renderFindings();
  renderRootCause();
  renderTimeline();
  renderRecs();
  document.title = `Health Report — ${REPORT_DATA.metadata.cluster_name} — ${REPORT_DATA.executive_summary.overall_status}`;
})();
</script>
</body>
</html>
