# Kettle environment properties — used by all transformations and jobs

# ── Database connections ──
DB_HOST=warehouse-db.internal.retailco.com
DB_PORT=5432
DB_NAME=retail_warehouse
DB_USER=etl_service
DB_PASSWORD=${KETTLE_DB_PASSWORD}

DB_STAGING_SCHEMA=staging
DB_WAREHOUSE_SCHEMA=dw

# ── Source database (inventory) ──
INVENTORY_DB_HOST=inventory-db.internal.retailco.com
INVENTORY_DB_PORT=5432
INVENTORY_DB_NAME=inventory_mgmt
INVENTORY_DB_USER=readonly_user
INVENTORY_DB_PASSWORD=${KETTLE_INVENTORY_PASSWORD}

# ── File paths ──
POS_INPUT_DIR=/data/pos/daily
ECOMMERCE_INPUT_DIR=/data/ecommerce/daily
OUTPUT_DIR=/data/warehouse/staging
ARCHIVE_DIR=/data/archive/${YYYY_MM_DD}

# ── Processing parameters ──
BATCH_SIZE=10000
MAX_ERRORS=100
SALES_DATE=${YYYY_MM_DD}
FISCAL_YEAR_START=2025-02-01

# ── Email notifications ──
SMTP_HOST=smtp.retailco.com
SMTP_PORT=587
ALERT_EMAIL=data-team@retailco.com
